name: Build SNAP package

run-name: Build ONLYOFFICE_Docs-${{ github.event.inputs.version }}-${{ github.event.inputs.build }}

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: 'Version'
        required: true
      build:
        description: 'Build number'
        type: string
        required: true

jobs:
  build_arm64:
    runs-on: ubuntu-24.04-arm
    outputs:
      revision: ${{ steps.revision.outputs.revision }}
    steps:
    - name: Check out Git repository
      uses: actions/checkout@v4

    - name: Replace Version and Build Number
      id: repl
      run: |
        VERSION=${{ github.event.inputs.version }}
        BUILD_NUMBER=${{ github.event.inputs.build }}
        #replace version
        sed -i -r "/version:/s/([0-9]+).([0-9]+).([0-9]+)/${VERSION}/" ./snap/snapcraft.yaml
        #replace link to archive to test
        #arm
        sed -i -e '/arm64:/s|https://download.onlyoffice.com/install/document|https://s3.eu-west-1.amazonaws.com/repo-doc-onlyoffice-com/|' ./snap/snapcraft.yaml
        sed -i -e '/arm64:/s|server/linux/|server/linux/snap/|' ./snap/snapcraft.yaml
        sed -i -e "/arm64:/s|_aarch64|-${BUILD_NUMBER}-aarch64|" ./snap/snapcraft.yaml

    - name: Build snap
      uses: snapcore/action-build@v1
      id: build

    - name: Publish ARM64 snap
      id: revision
      env:
        SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
      run: |
        set -euo pipefail
        snapcraft upload "onlyoffice-ds_${{ github.event.inputs.version }}_arm64.snap" --release beta 2>&1 | tee snapcraft-publish-arm64.log
        REVISION=$(grep -oE 'Revision [0-9]+' snapcraft-publish-arm64.log | awk '{print $2}' | tail -n 1 || true)
        if [[ -z "$REVISION" ]]; then
          echo "::error::ARM64 revision was not found in publish log"
          exit 1
        fi
        echo "revision=$REVISION" >> "$GITHUB_OUTPUT"
        echo "::notice::Snap published to revision $REVISION"

    - name: Upload ARM64 publish log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: snapcraft-publish-arm64-${{ github.run_id }}
        path: snapcraft-publish-arm64.log
        if-no-files-found: warn

  build_amd64:
    runs-on: ubuntu-24.04
    outputs:
      revision: ${{ steps.revision.outputs.revision }}
    steps:
    - name: Check out Git repository
      uses: actions/checkout@v4

    - name: Replace Version and Build Number
      id: repl
      run: |
        VERSION=${{ github.event.inputs.version }}
        BUILD_NUMBER=${{ github.event.inputs.build }}
        #replace version
        sed -i -r "/version:/s/([0-9]+).([0-9]+).([0-9]+)/${VERSION}/" ./snap/snapcraft.yaml
        #replace link to archive to test
        #x64
        sed -i -e '/amd64:/s|https://download.onlyoffice.com/install/document|https://s3.eu-west-1.amazonaws.com/repo-doc-onlyoffice-com/|' ./snap/snapcraft.yaml
        sed -i -e '/amd64:/s|server/linux/|server/linux/snap/|' ./snap/snapcraft.yaml
        sed -i -e "/amd64:/s|_x86_64|-${BUILD_NUMBER}-x86_64|" ./snap/snapcraft.yaml

    - name: Build snap
      uses: snapcore/action-build@v1
      id: build

    - name: Publish AMD64 snap
      id: revision
      env:
        SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
      run: |
        set -euo pipefail
        snapcraft upload "onlyoffice-ds_${{ github.event.inputs.version }}_amd64.snap" --release beta 2>&1 | tee snapcraft-publish-amd64.log
        REVISION=$(grep -oE 'Revision [0-9]+' snapcraft-publish-amd64.log | awk '{print $2}' | tail -n 1 || true)
        if [[ -z "$REVISION" ]]; then
          echo "::error::AMD64 revision was not found in publish log"
          exit 1
        fi
        echo "revision=$REVISION" >> "$GITHUB_OUTPUT"
        echo "::notice::Snap published to revision $REVISION"

    - name: Upload AMD64 publish log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: snapcraft-publish-amd64-${{ github.run_id }}
        path: snapcraft-publish-amd64.log
        if-no-files-found: warn
